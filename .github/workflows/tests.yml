name: tests

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Run unit tests
        run: python3 test_connection_quality_monitor.py
      - name: Compile executable
        run: python3 -m py_compile connection-quality-monitor
      - name: Smoke test SQLite storage
        run: |
          ./connection-quality-monitor --once --quiet --out-dir /tmp/cqm-ci \
            --ping-targets '' --dns-hosts '' --http-urls '' --download-url ''
          python3 - <<'PY'
          import sqlite3
          con = sqlite3.connect('/tmp/cqm-ci/connection-quality.sqlite')
          tables = {row[0] for row in con.execute("select name from sqlite_master where type='table'")}
          assert 'samples' in tables
          assert 'metadata' in tables
          PY
